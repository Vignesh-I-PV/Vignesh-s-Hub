<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- React + JSX transform, loaded from CDN so there's no build step -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Supabase client (handles auth + database calls) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<!-- Your project's URL/key — edit config.js, not this file -->
<script src="config.js"></script>
</head>
<body>
<div id="root"></div>

<!--
  We transform app.jsx manually (instead of using <script type="text/babel" src="...">)
  so we can force the "classic" JSX runtime. Newer Babel defaults to the "automatic"
  runtime, which compiles JSX into `import {jsx} from "react/jsx-runtime"` — real ES
  module syntax that a plain <script> tag can't execute. Classic runtime compiles JSX
  into React.createElement(...) calls instead, which works with the plain UMD React
  build loaded above.
-->
<script>
  fetch('app.jsx')
    .then(res => res.text())
    .then(code => {
      const output = Babel.transform(code, {
        presets: [['react', { runtime: 'classic' }]]
      }).code;
      const script = document.createElement('script');
      script.text = output;
      document.body.appendChild(script);
    })
    .catch(err => {
      document.getElementById('root').innerHTML =
        '<p style="color:#EB5A5A; font-family:monospace; padding:20px;">Failed to load app.jsx: ' + err.message + '</p>';
    });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed', err));
  }
</script>
</body>
</html>
